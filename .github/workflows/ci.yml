name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

  deploy:
    name: Deploy to Vercel
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Link Vercel project
        run: vercel link --yes --project=${{ secrets.VERCEL_PROJECT_NAME }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Set Vercel environment variables
        run: |
          printf '%s' "$NEXT_PUBLIC_API_URL" | vercel env add NEXT_PUBLIC_API_URL production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "$ADMIN_USERNAME" | vercel env add ADMIN_USERNAME production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "$ADMIN_PASSWORD" | vercel env add ADMIN_PASSWORD production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "$AUTH_SECRET" | vercel env add AUTH_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "$ADMIN_API_KEY" | vercel env add ADMIN_API_KEY production --token=${{ secrets.VERCEL_TOKEN }} --force

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
